<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGradient)"/>
  
  <!-- Target circles -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#targetGradient)" stroke-width="24" opacity="0.3"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#targetGradient)" stroke-width="20" opacity="0.5"/>
  <circle cx="256" cy="256" r="40" fill="url(#targetGradient)"/>
  
  <!-- Checkmark -->
  <path d="M220 256 L248 284 L300 220" fill="none" stroke="#8B5CF6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
